version: 0.2

env:
  variables:
    AWS_REGION: ap-south-2
    IMAGE_REPO_NAME: brain-app

phases:
  pre_build:
    commands:
      - echo Logging into ECR...
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.ap-south-2.amazonaws.com/brain-tasks-app
      - aws ecr get-login-password --region ap-south-2 | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - echo Build started on `date`
      - docker build -t brain-tasks-app .
      - docker tag brain-tasks-app:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo Pushing image to ECR...
      - docker push $REPOSITORY_URI:latest
      - echo Build completed